name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: ${{ matrix.os }} / Py ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      # fail-fast: false ensures that if Windows fails, Linux tests keep running.
      # This helps you see if a bug is specific to one OS or global.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # We use quotes ".[test]" to ensure shells (like zsh or PowerShell) 
        # don't misinterpret the brackets.
        pip install -e ".[test]"

    - name: Run Tests
      run: |
        pytest

    # Optional: Upload coverage to Codecov
    # - name: Upload coverage to Codecov
