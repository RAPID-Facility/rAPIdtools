name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: ${{ matrix.os }} / Py ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      # fail-fast: false ensures that if Windows fails, Linux tests keep running.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # We use quotes ".[test]" to ensure shells (like zsh or PowerShell) 
        # don't misinterpret the brackets.
        pip install -e ".[test]"

    - name: Run Tests and Generate Badge
      shell: bash
      run: |
        # Run pytest and save output:
        pytest --cov=rapidtools | tee coverage_output.txt
        
        # Extract the coverage number:
        COVERAGE=$(grep "TOTAL" coverage_output.txt | awk '{print $NF}' | sed 's/%//')
        
        # Save to env var:
        echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV

    - name: Update Dynamic Badge
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: schneegans/dynamic-badges-action@v1.7.0
      with:
        auth: ${{ secrets.GIST_SECRET }}
        gistID: ${{ secrets.GIST_ID }}
        filename: coverage.json
        label: Coverage
        message: ${{ env.COVERAGE }}%
        
        # --- Color Range Configuration ---
        # The number to evaluate (actual code coverage)
        valColorRange: ${{ env.COVERAGE }}
        # Coverage >= 90% will be pure green:
        maxColorRange: 90
        # Coverage <= 50% will be pure red:
        minColorRange: 50
